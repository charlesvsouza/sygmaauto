name: Reset & Seed Database (Railway)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Digite RESET para confirmar — TODOS os dados serão apagados'
        required: true

jobs:
  reset-db:
    name: Reset Database & Seed
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'RESET' }}

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate DATABASE_PUBLIC_URL
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_PUBLIC_URL está vazio."
            echo ""
            echo "Para obter a URL pública do Railway PostgreSQL:"
            echo "1. Railway dashboard → projeto → serviço PostgreSQL → Settings"
            echo "2. Em 'Networking', clique em 'Generate Domain' para ativar o proxy público"
            echo "3. Copie a DATABASE_PUBLIC_URL gerada"
            echo "4. Adicione/atualize a secret DATABASE_PUBLIC_URL no GitHub"
            exit 1
          fi
          echo "DATABASE_URL configurada corretamente."
        env:
          DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL }}

      - name: Drop and recreate all tables
        run: npx prisma migrate reset --force --skip-seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL }}

      - name: Run seed (planos + superadmin + tenants)
        run: npx ts-node prisma/seed.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
          SEED_SUPERADMIN_PASSWORD: ${{ secrets.SEED_SUPERADMIN_PASSWORD }}
          SEED_MASTER_PASSWORD: ${{ secrets.SEED_MASTER_PASSWORD }}
