version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: oficina360-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oficina360
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: oficina360-backend
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/oficina360?schema=public"
      JWT_SECRET: "oficina360-secret-key-change-in-production"
      JWT_REFRESH_SECRET: "oficina360-refresh-secret-change-in-production"
      FRONTEND_URL: "http://localhost:5173"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: oficina360-frontend
    environment:
      VITE_API_URL: "http://localhost:3000"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: